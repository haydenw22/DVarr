name: Publish Docker image (GHCR)

# Builds the DVarr image and pushes it to the GitHub Container Registry so it can
# be pulled by Unraid Community Applications and anyone running the CA template.
#
# Triggers:
#   - pushing a version tag (v1.2.3)  -> publishes :1.2.3, :1.2, and :latest
#   - manual "Run workflow" button    -> publishes :latest
#
# First-time setup (once, after the first successful run):
#   GitHub -> your profile -> Packages -> dvarr -> Package settings ->
#   Danger Zone -> Change visibility -> Public.
#   CA/Unraid can only pull a PUBLIC package.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dvarr
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=DVarr
            org.opencontainers.image.description=Reliability-first, self-hosted IPTV sports DVR
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-3.0-only

      # ffmpeg in the Dockerfile is an amd64-only BtbN static build, so we publish
      # linux/amd64 only. That covers effectively all Unraid hosts.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bundled TheSportsDB v2 key: set the repo secret THESPORTSDB_API_KEY (Settings ->
          # Secrets and variables -> Actions) and it is baked into the image as a BuildKit
          # secret (see Dockerfile) — never into the repo, image history, or container env.
          # Users can still override it with their own key in DVarr's Settings.
          secrets: |
            tsdb_api_key=${{ secrets.THESPORTSDB_API_KEY }}
