<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DVarr</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">D<span>V</span>arr<small>IPTV Sports DVR</small></div>
      <nav class="menu" id="menu"></nav>
      <div class="sidebar-foot"><span class="dot" id="footDot"></span><span id="footTxt">connecting…</span></div>
    </aside>
    <div class="content">
      <header class="topbar">
        <h1 id="pageTitle">Dashboard</h1>
        <div class="actions" id="pageActions"></div>
        <div class="status">
          <span id="stSlots" title="free / total credential slots">— / —</span>
          <span id="stClock" class="mono"></span>
        </div>
      </header>
      <main id="view"><div class="loading">Loading…</div></main>
    </div>
  </div>
  <div id="modalRoot"></div>
  <div id="toastRoot"></div>
  <script src="js/mpegts.js"></script>
  <script src="js/hls.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
