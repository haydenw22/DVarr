<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1c" />
  <meta name="color-scheme" content="dark" />
  <title>DVarr</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DVarr" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="scrim" id="scrim"></div>
    <aside class="sidebar">
      <div class="brand"><img src="dvarr-logo.png" alt="" /><div><span>DV</span>arr<small>IPTV Sports DVR</small></div></div>
      <nav class="menu" id="menu"></nav>
      <div class="sidebar-foot">
        <a class="foot-donate" href="https://ko-fi.com/haydenw22" target="_blank" rel="noopener" title="Support the creator" onclick="return donate()">🍺 Buy me a beer for the next game</a>
        <span class="foot-chip"><span class="dot" id="footDot"></span><span id="footTxt">connecting…</span></span>
      </div>
    </aside>
    <div class="content">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="menu">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="actions" id="pageActions"></div>
        <div class="status">
          <span class="chip" title="free / total credential slots"><span class="dot" id="stSlotsDot"></span><span id="stSlots">— / —</span></span>
          <span class="chip" title="database health"><span class="dot" id="stDbDot"></span><span id="stDbTxt">Database</span></span>
          <span id="stClock" class="mono"></span>
        </div>
      </header>
      <main id="view"><div class="loading">Loading…</div></main>
    </div>
  </div>
  <div id="modalRoot"></div>
  <div id="toastRoot"></div>
  <script src="js/mpegts.js"></script>
  <script src="js/hls.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
