<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1c" />
  <meta name="color-scheme" content="dark" />
  <title>DVarr</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DVarr" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="scrim" id="scrim"></div>
    <aside class="sidebar">
      <div class="brand"><img src="dvarr-logo.png" alt="" /><div><span>DV</span>arr<small>IPTV Sports DVR</small></div></div>
      <nav class="menu" id="menu"></nav>
      <div class="sidebar-foot">
        <a class="foot-donate" href="https://ko-fi.com/haydenw22" target="_blank" rel="noopener" title="Support the creator" onclick="return donate()">🍺 Buy me a beer for the next game</a>
        <a class="foot-discord" href="https://discord.gg/Nb59pEzGb6" target="_blank" rel="noopener" title="Join the DVarr Discord">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" stroke="none" d="M20.3 4.4A19.8 19.8 0 0 0 15.4 3l-.25.5a18.3 18.3 0 0 1 4.34 1.35 16.5 16.5 0 0 0-13.06 0A18.3 18.3 0 0 1 10.85 3.5L10.6 3a19.8 19.8 0 0 0-4.9 1.4C2.5 9.05 1.65 13.6 2.06 18.08A19.9 19.9 0 0 0 8.1 21l.5-.72a13 13 0 0 1-2.05-1c.17-.13.34-.26.5-.4a14.2 14.2 0 0 0 12 0c.17.14.33.27.5.4a13 13 0 0 1-2.06 1l.5.72a19.9 19.9 0 0 0 6.05-2.93c.48-5.2-.82-9.7-3.44-13.67ZM9.05 15.33c-1.18 0-2.15-1.08-2.15-2.4 0-1.33.95-2.42 2.15-2.42s2.17 1.1 2.15 2.42c0 1.32-.96 2.4-2.15 2.4Zm5.9 0c-1.18 0-2.15-1.08-2.15-2.4 0-1.33.95-2.42 2.15-2.42s2.17 1.1 2.15 2.42c0 1.32-.95 2.4-2.15 2.4Z"/></svg>
          <span>Join the Discord</span>
        </a>
        <span class="foot-chip"><span class="dot" id="footDot"></span><span id="footTxt">connecting…</span></span>
      </div>
    </aside>
    <div class="content">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="menu">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="actions" id="pageActions"></div>
        <div class="status">
          <span class="chip" title="free / total credential slots"><span class="dot" id="stSlotsDot"></span><span id="stSlots">— / —</span></span>
          <span class="chip" title="database health"><span class="dot" id="stDbDot"></span><span id="stDbTxt">Database</span></span>
          <span id="stClock" class="mono"></span>
        </div>
      </header>
      <main id="view"><div class="loading">Loading…</div></main>
    </div>
  </div>
  <div id="modalRoot"></div>
  <div id="toastRoot" role="status" aria-live="polite" aria-atomic="false"></div>
  <script src="js/mpegts.js"></script>
  <script src="js/hls.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
