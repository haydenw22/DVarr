<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign in · DVarr</title>
  <meta name="robots" content="noindex" />
  <style>
    /* Fully self-contained: no external css/js/fonts/images so only /login.html needs to be auth-exempt. */
    :root {
      --bg: #0a0f1c;
      --card: #111a2e;
      --accent: #3b82f6;
      --accent-hover: #2f6fe0;
      --text: #e7eefc;
      --muted: #8ea0c0;
      --border: #223252;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .45);
    }
    .brand {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -.5px;
      margin: 0 0 4px;
    }
    .brand span { color: var(--accent); }
    .tagline { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 6px; }
    input[type=text], input[type=password] {
      width: 100%;
      background: #0c1424;
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 15px;
      padding: 11px 12px;
      margin: 0 0 16px;
      outline: none;
    }
    input[type=text]:focus, input[type=password]:focus { border-color: var(--accent); }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text);
      margin: 2px 0 22px;
      cursor: pointer;
      user-select: none;
    }
    .remember input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: .6; cursor: default; }
    .msg {
      display: none;
      color: var(--error);
      font-size: 13px;
      margin: 14px 0 0;
      text-align: center;
    }
    .msg.show { display: block; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="brand"><span>DV</span>arr</h1>
    <p class="tagline">IPTV Sports DVR</p>
    <form id="f" autocomplete="on">
      <label for="u">Username</label>
      <input id="u" name="username" type="text" autocomplete="username" autofocus autocapitalize="none" autocorrect="off" spellcheck="false" />
      <label for="p">Password</label>
      <input id="p" name="password" type="password" autocomplete="current-password" />
      <label class="remember"><input id="r" type="checkbox" checked /> Remember this device</label>
      <button id="btn" type="submit">Sign in</button>
      <p id="msg" class="msg" role="alert"></p>
    </form>
  </main>
  <script>
    'use strict';
    var form = document.getElementById('f');
    var btn = document.getElementById('btn');
    var msg = document.getElementById('msg');
    function showError(text) { msg.textContent = text; msg.classList.add('show'); }
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      msg.classList.remove('show');
      btn.disabled = true;
      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('u').value,
            password: document.getElementById('p').value,
            remember: document.getElementById('r').checked
          })
        });
        if (res.ok) { location.replace('/'); return; }
        if (res.status === 429) { showError('Too many attempts. Please wait a few minutes and try again.'); }
        else { showError('Invalid username or password.'); }
      } catch (err) {
        showError('Could not reach the server. Check your connection and try again.');
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
